<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - VillaNova</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVIGATION -->
<nav class="nav" aria-label="Navigation principale">
  <a href="index.html" class="nav__logo">VillaNova</a>

  <ul class="nav__links">
    <li><a href="index.html">Événements</a></li>
    <li><a href="login.html" aria-current="page">Connexion</a></li>
    <li><a href="register.html">Inscription</a></li>
  </ul>
</nav>

<header class="header">
  <h1>Connexion</h1>
</header>

<main class="auth">

  <h2 class="sr-only">Formulaire de connexion</h2>

  <form id="loginForm">

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" type="password" name="password" required autocomplete="current-password">
    </div>

    <button type="submit">Se connecter</button>

  </form>

  <p class="auth__link">
    Pas encore inscrit ?
    <a href="register.html">Créer un compte</a>
  </p>

</main>

<footer class="footer" role="contentinfo">
  <p>© 2026 VillaNova — Tous droits réservés</p>
</footer>

<script type="module" src="../js/app.js"></script>

</body>
</html>
