<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VillaNova - Événements</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header class="header">
  <h1>VillaNova</h1>

  <label for="searchInput" class="sr-only">Rechercher un événement</label>
  <input 
    type="search" 
    id="searchInput"
    placeholder="Rechercher un événement..."
    aria-label="Rechercher un événement"
  >
</header>

<main>

  <section class="events" aria-labelledby="events-title">
    <h2 id="events-title" class="sr-only">Liste des événements</h2>

    <div 
      id="eventsContainer" 
      class="events-grid"
      aria-live="polite"
    >
      <!-- événements injectés via API -->
    </div>
  </section>

</main>

<footer class="footer" role="contentinfo">
  <p>© 2026 VillaNova — Tous droits réservés</p>
</footer>

<script type="module" src="../js/app.js"></script>

</body>
</html>
