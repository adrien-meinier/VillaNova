<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VillaNova</title>
<link rel="stylesheet" href="../css/main.css">
</head>

<body>

<header class="header">
  <div class="header__top">
    <button class="header__burger">☰</button>

    <div class="header__brand">
      <h1 class="header__title">VillaNova</h1>
      <img class="header__logo" src="../img/logo.png">
    </div>
  </div>

  <nav class="header__nav">
    <ul class="header__list">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="mes_evenements.html">Mes événements</a></li>
      <li><a href="login.html">Connexion</a></li>
      <li><a href="inscription.html">Inscription</a></li>
    </ul>
  </nav>
</header>

<main>

<section class="search">
  <input type="search" placeholder="Rechercher un événement">
</section>

<section class="filters">
  <button class="filters__btn active">Tous</button>
  <button class="filters__btn">Concerts</button>
  <button class="filters__btn">Expositions</button>
</section>

<section class="events">
  <div class="events__grid">

    <article class="card">
      <img src="../img/concert.jpg">
      <div class="card__content">
        <h3>Jazz Night</h3>
        <p class="card__price">Gratuit</p>
      </div>
    </article>

  </div>
</section>

</main>

<footer class="footer">
  <p>© 2026 VillaNova - Tous droits réservés</p>
</footer>

</body>
</html>
